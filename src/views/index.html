<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hono API</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #22c55e;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.25);
      border-radius: 999px;
      padding: 0.25rem 0.75rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .endpoints {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .endpoint {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }

    .endpoint:hover { border-color: #444; }

    .method {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      color: #a78bfa;
      background: rgba(167, 139, 250, 0.1);
      border-radius: 4px;
      padding: 0.2rem 0.45rem;
      flex-shrink: 0;
    }

    .path {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 0.875rem;
      color: #e8e8e8;
      flex: 1;
    }

    .desc {
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">live</div>
    <h1>Hono API</h1>
    <p class="subtitle">Minimal REST API built with Hono &amp; Bun.</p>

    <div class="endpoints">
      <a class="endpoint" href="/posts">
        <span class="method">GET</span>
        <span class="path">/posts</span>
        <span class="desc">paginated list</span>
      </a>
      <a class="endpoint" href="/posts/1">
        <span class="method">GET</span>
        <span class="path">/posts/:id</span>
        <span class="desc">single post</span>
      </a>
    </div>
  </div>
</body>
</html>
